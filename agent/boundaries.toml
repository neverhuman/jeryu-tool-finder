schema_version = "1.0.0"
workspace = "jeryu-tool-finder"
profile = "public-portal"
required_check = "jeryu-tool-finder/required"

[split]
# The engine (jeryu-codegraph) is consumed by pinned public git tag; the
# [patch] section in Cargo.toml redirects to the local split checkout for
# family development, mirroring jeryu-deploy's wiring.
cross_repo_dependency_policy = "pinned-public-git-tags"
local_path_patches = true

cargo_members = [
  "jeryu-tool-finder",
]

[python]
# ops/ is the CI gate (shell + the score lane's python helper); scripts/ keeps
# the gate wrapper shells (ci-doctor, ci-local). Discovery is all Rust (src/).
allowed_non_product_paths = ["scripts/", "ops/"]
