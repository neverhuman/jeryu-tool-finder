schema_version = "1.0.0"
workspace = "jeryu-tool-finder"
profile = "public-portal"
required_check = "jeryu-tool-finder/required"

[split]
cross_repo_dependency_policy = "pinned-public-git-tags"
local_path_patches = false

cargo_members = [

]

[python]
# The finder is pure analysis tooling, not product truth or a DB: scripts/ drives
# the codegraph engine and writes dossiers; ops/ is the CI gate.
allowed_non_product_paths = ["scripts/", "ops/"]
