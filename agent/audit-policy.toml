schema_version = "1.0.0"
workspace = "jeryu-tool-finder"
# public-portal profile (family convention for -tool/-tool-finder repos), now
# carrying a single all-Rust binary (src/) that consumes the jeryu-codegraph
# engine as a pinned-tag library, plus the ops/ CI gate.

#
# Reviewed floor = 75. The 2026-06 Rust rewrite (Python scripts -> cargo
# binary with fmt/clippy/test + property tests, an end-to-end pipeline test, a
# typed exception surface, and a dependency-review security lane) measures a
# clean full-scan 76 (0 caps, 0 hard findings) under the family-pinned auditor
# (JERYU_JANKURAI_BIN, the same binary the Layer-2 scoring funnel runs).
# Several weighted dimensions are structurally capped for a small discovery
# tool (no DB -> data-truth ceiling, no heavy build graph -> build-speed
# ceiling), mirroring jeryu-tool's documented profile-calibrated floor. The
# floor sits one point under the reviewed score to absorb scanner jitter, NOT
# to hide caps: the hard gates below are absolute and ops/ci/score.sh fails on
# ANY cap regardless of score (hard_findings_allowed = 0, caps must be 0).
# Always score with --full — the [smart] incremental scan gives inconsistent
# caps.
minimum_score = 75
hard_findings_allowed = 0
required_tool = "jankurai"
required_tool_version = "1.6.10"

[scan]
excluded_paths = [
  ".jankurai/",
  "dossiers/",   # generated cluster dossiers; produced by just scan + just dossier
  "target/",     # cargo build output
]
